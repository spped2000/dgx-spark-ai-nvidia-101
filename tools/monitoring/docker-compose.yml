# Triton-style "control room" dashboard — Prometheus + Grafana scrape vLLM /metrics
# (vLLM/Triton/NIM expose Prometheus metrics เหมือนกัน — ที่นี่ scrape vLLM NGC :8000 บน host)
# ใช้: cd tools/monitoring && docker compose up -d  → เปิด http://localhost:3001 (Grafana, anonymous)
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: dgx-prometheus
    extra_hosts: ["host.docker.internal:host-gateway"]   # Linux: ให้ container เห็น vLLM บน host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: dgx-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]     # 3000 ชนกับ Open WebUI → ใช้ 3001
    depends_on: [prometheus]
    restart: unless-stopped
